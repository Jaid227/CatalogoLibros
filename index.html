
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Catálogo de Cuentos | Presentación Literaria</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome 6 (gratuito) para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <!-- Pantalla principal de inicio -->
    <main id="main-screen" class="screen active">
        <div class="hero">
            <h1 class="main-title">Universos Narrativos</h1>
            <p class="subtitle">Explora mundos donde las palabras cobran vida</p>
        </div>

        <div class="categories-container">
            <button class="category-btn" data-category="fiction">Ficción</button>
            <button class="category-btn" data-category="horror">Terror</button>
            <button class="category-btn" data-category="drama">Drama</button>
            <button class="category-btn" data-category="novel">Novela</button>
        </div>
        
        <footer class="main-footer">
            <div class="author-info">
                <p><strong>Emmanuel Ciaro</strong></p>
                <div class="contact-row">
                    <span><i class="fas fa-phone-alt"></i> +52 55 1234 5678</span>
                    <span><i class="fas fa-envelope"></i> EmmanuelCiaro@cuentos.mx</span>
                </div>
                <div class="social-icons">
                    <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
        </footer>
    </main>

    <!-- Pantalla de galería por categoría -->
    <section id="gallery-screen" class="screen">
        <div class="gallery-header">
            <button id="back-to-main" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</button>
            <h2 id="category-title">Categoría</h2>
        </div>
        <div id="books-grid" class="books-grid">
            <!-- Aquí se renderizan dinámicamente las portadas (imágenes) -->
        </div>
    </section>

    <!-- Pantalla de detalle del libro -->
    <section id="detail-screen" class="screen">
        <div class="detail-header">
            <button id="back-to-gallery" class="back-btn"><i class="fas fa-arrow-left"></i> Regresar</button>
        </div>
        <div id="book-detail-container" class="book-detail-card">
            <!-- Contenido dinámico de descripción, autor, género, fecha, editorial -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
